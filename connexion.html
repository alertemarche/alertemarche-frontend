<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — AlerteMarché</title>
  <meta name="description" content="Connectez-vous à votre espace AlerteMarché pour gérer vos alertes et abonnements.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=202607211300">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RRXKSCN05J"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-RRXKSCN05J');</script>
</head>
<body data-no-chrome="1">

  <div class="auth">
    <aside class="auth__aside">
      <a href="index.html" class="brand" style="color:#fff;margin-bottom:30px;">
        <span class="brand__mark">🔔</span><span style="color:#fff;">Alerte<b style="color:#fff;">Marché</b></span>
      </a>
      <h2>Bon retour parmi nous 👋</h2>
      <p style="opacity:.95;">Retrouvez vos alertes, gérez vos abonnements et suivez les opportunités qui comptent pour vous.</p>
      <ul>
        <li>Toutes vos alertes centralisées</li>
        <li>Gestion multi-pays</li>
        <li>Support réactif</li>
      </ul>
    </aside>

    <div class="auth__form">
      <a href="index.html" class="brand" style="margin-bottom:20px;"><span class="brand__mark">🔔</span><span>Alerte<b>Marché</b></span></a>
      <h2 class="mb-2">Connexion</h2>
      <div id="loginMsg"></div>
      <div class="field"><label>E-mail ou téléphone</label><input class="input" id="lIdentifier" placeholder="vous@exemple.com ou +229…"></div>
      <div class="field"><label>Mot de passe</label><input class="input" id="lPassword" type="password" placeholder="Votre mot de passe"></div>
      <button class="btn btn--primary btn--block btn--lg" id="loginBtn">Se connecter</button>
      <p class="text-center muted mt-2">Pas encore de compte ? <a href="inscription.html">Créer un compte gratuit</a></p>
    </div>
  </div>

  <script src="js/app.js?v=202607211300"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('loginBtn').addEventListener('click', login);
      document.getElementById('lPassword').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    });
    async function login() {
      const msg = document.getElementById('loginMsg');
      const identifier = document.getElementById('lIdentifier').value.trim();
      const password = document.getElementById('lPassword').value;
      if (!identifier || !password) { msg.innerHTML = '<div class="notice" style="border-color:var(--danger);color:var(--danger);">Renseignez vos identifiants.</div>'; return; }
      msg.innerHTML = '<div class="notice">Connexion…</div>';
      try {
        const res = await api('/auth/login', { method: 'POST', body: { identifier, password } });
        if (res.token) localStorage.setItem('am_token', res.token);
        gtag('event', 'login');
        location.href = (res.user && res.user.profile_type === 'admin_public' && res.user.is_admin) ? 'admin.html' : 'dashboard.html';
      } catch (e) {
        msg.innerHTML = '<div class="notice" style="border-color:var(--danger);color:var(--danger);">Identifiants incorrects. Réessayez.</div>';
      }
    }
  </script>
</body>
</html>
