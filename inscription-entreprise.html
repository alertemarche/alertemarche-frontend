<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — AlerteMarché Bénin</title>
  <meta name="robots" content="noindex">
  <script>
    // Cette étape a été fusionnée dans l'inscription en 3 étapes.
    // On redirige vers la nouvelle page unique (profil + informations),
    // en conservant le profil éventuellement passé en paramètre.
    (function () {
      var p = new URLSearchParams(location.search).get('profil');
      location.replace('inscription.html' + (p ? '?profil=' + encodeURIComponent(p) : ''));
    })();
  </script>
</head>
<body>
  <noscript><meta http-equiv="refresh" content="0; url=inscription.html"></noscript>
  <p style="font-family:sans-serif;padding:24px;">Redirection vers l'inscription… <a href="inscription.html">Cliquez ici</a> si rien ne se passe.</p>
</body>
